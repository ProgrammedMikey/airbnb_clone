default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: root
  host: localhost

development:
  <<: *default
  database: midnighthaven_api_development

test:
  <<: *default
  database: midnighthaven_api_test

production:
  primary: &primary_production
    <<: *default
    database: midnighthaven_api_production
    username: midnighthaven_api
    # password is omitted

  cache:
    <<: *primary_production
    database: midnighthaven_api_production_cache
    migrations_paths: db/cache_migrate

  queue:
    <<: *primary_production
    database: midnighthaven_api_production_queue
    migrations_paths: db/queue_migrate

  cable:
    <<: *primary_production
    database: midnighthaven_api_production_cable
    migrations_paths: db/cable_migrate
